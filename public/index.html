<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ButterBakeryCafe</title>

    <!-- Мета-теги для улучшенной адаптации на мобильных устройствах -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#BE723E">
    <meta name="description" content="Вкуснейшие торты и круассаны с доставкой">

    <!-- Иконки для разных устройств -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Общие стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Шапка с декоративными элементами -->
        <header class="header">
            <!-- Декоративные элементы -->
            <div class="header-ornament-left"></div>
            <div class="header-ornament-right"></div>

            <div class="header-decoration"></div>
            <div class="header-scroll"></div>
            <div class="header-scroll-right"></div>

            <div class="header-confetti">
                <i class="fas fa-heart"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-cookie-bite"></i>
                <i class="fas fa-candy-cane"></i>
                <i class="fas fa-crown"></i>
            </div>

            <div class="sparkle sparkle-1">✨</div>
            <div class="sparkle sparkle-2">✨</div>
            <div class="sparkle sparkle-3">✨</div>

            <div class="header-content">
                <div class="header-left">
                    <!-- Встроенный SVG логотип (круассан) -->
                    <svg class="header-logo" width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#BE723E" />
                                <stop offset="100%" stop-color="#D4A373" />
                            </linearGradient>
                        </defs>
                        <path d="M30 35 C25 45, 25 60, 35 70 C45 78, 60 75, 68 65 C75 55, 72 40, 62 32 C52 25, 38 28, 30 35"
                              fill="url(#logoGradient)" stroke="#A45F32" stroke-width="3"/>
                        <path d="M42 42 L35 52 L45 58 L58 48 L50 40 L42 42"
                              fill="#F8F5F0" stroke="#A45F32" stroke-width="2"/>
                        <path d="M48 45 Q52 48, 55 45" stroke="#A45F32" stroke-width="2" fill="none"/>
                        <circle cx="45" cy="50" r="2" fill="#A45F32"/>
                        <circle cx="52" cy="48" r="2" fill="#A45F32"/>
                    </svg>
                </div>
                <div class="header-title-wrapper">
                    <div class="header-title">ButterBakeryCafe</div>
                </div>
                <div class="header-right">
                    <a href="/admin" id="adminLink" style="display: none;">
                        <button class="admin-btn">
                            <i class="fas fa-crown"></i> Админ
                        </button>
                    </a>
                </div>
            </div>
        </header>

        <!-- Категории товаров -->
        <div class="categories" id="categoriesContainer">
            <button class="category active" data-category="all">Всё</button>
            <!-- Категории будут загружаться через JavaScript -->
        </div>

        <!-- Сетка товаров - 2 карточки в ряд (адаптивно) -->
        <div class="cakes-grid" id="cakesGrid">
            <div class="loading">Загрузка товаров...</div>
        </div>

        <!-- Плавающая кнопка корзины -->
        <button class="cart-icon" id="cartIcon">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </button>

        <!-- Панель корзины -->
        <div class="cart-panel" id="cartPanel">
            <div class="cart-header">
                <h2>Корзина</h2>
                <button class="close-cart" id="closeCart">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="cart-items" id="cartItems">
                <!-- Товары в корзине будут добавляться через JavaScript -->
                <div class="empty-state">
                    <i class="fas fa-shopping-cart"></i>
                    <p>Корзина пуста</p>
                    <span>Добавьте товары из каталога</span>
                </div>
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Итого:</span>
                    <span id="cartTotalPrice">0 ₽</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>
            </div>
        </div>

        <!-- Модальное окно оформления заказа -->
        <div class="modal" id="checkoutModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Оформление заказа</h2>
                    <button class="close-modal" id="closeModal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="orderForm" class="order-form">
                    <div class="form-group">
                        <label for="name">Ваше имя *</label>
                        <input type="text" id="name" required minlength="2" placeholder="Иван Иванов">
                    </div>

                    <div class="form-group">
                        <label for="phone">Телефон *</label>
                        <input type="tel" id="phone" required placeholder="+7 (999) 999-99-99">
                    </div>

                    <div class="form-group">
                        <label for="address">Адрес доставки *</label>
                        <input type="text" id="address" required placeholder="ул. Ленина, д. 1, кв. 1">
                    </div>

                    <div class="form-row">
                        <div class="form-group date-field">
                            <label for="deliveryDate">Дата доставки *</label>
                            <div class="input-with-icon">
                                <input type="text" id="deliveryDate" required placeholder="Выберите дату" readonly>
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                        </div>
                        <div class="form-group time-field">
                            <label for="deliveryTime">Время *</label>
                            <div class="input-with-icon">
                                <input type="text" id="deliveryTime" required placeholder="Выберите время" readonly>
                                <i class="fas fa-clock"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="wish">Пожелания к заказу</label>
                        <textarea id="wish" rows="2" placeholder="Комментарий для курьера..."></textarea>
                    </div>

                    <div class="order-summary" id="orderSummary">
                        <!-- Краткое содержание заказа -->
                    </div>

                    <button type="submit" class="submit-order">Подтвердить заказ</button>
                </form>
            </div>
        </div>

        <!-- Модальное окно выбора даты (календарь) -->
        <div class="modal" id="datePickerModal">
            <div class="modal-content bottom-sheet">
                <div class="modal-header">
                    <h2>Выберите дату</h2>
                    <button class="close-modal" onclick="closeDatePicker()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="date-picker-content">
                    <div class="month-selector">
                        <button class="month-nav" onclick="changeMonth(-1)">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="current-month" id="currentMonth">Март 2026</span>
                        <button class="month-nav" onclick="changeMonth(1)">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>

                    <div class="weekdays">
                        <span>ПН</span>
                        <span>ВТ</span>
                        <span>СР</span>
                        <span>ЧТ</span>
                        <span>ПТ</span>
                        <span>СБ</span>
                        <span>ВС</span>
                    </div>

                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Дни будут генерироваться через JavaScript -->
                    </div>

                    <div class="date-actions">
                        <button class="date-btn reset" type="button" onclick="resetDate()">Сбросить</button>
                        <button class="date-btn confirm" type="button" onclick="confirmDate()">Готово</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно выбора времени (Time Picker) -->
        <div class="modal" id="timePickerModal">
            <div class="modal-content bottom-sheet">
                <div class="modal-header">
                    <h2>Выберите время</h2>
                    <button class="close-modal" onclick="closeTimePicker()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="time-picker-content">
                    <!-- Часы -->
                    <div class="time-section">
                        <label>Часы</label>
                        <div class="time-scroll" id="hourSelector">
                            <!-- Часы будут сгенерированы JS -->
                        </div>
                    </div>

                    <!-- Минуты -->
                    <div class="time-section">
                        <label>Минуты</label>
                        <div class="time-scroll" id="minuteSelector">
                            <!-- Минуты будут сгенерированы JS -->
                        </div>
                    </div>

                    <div class="selected-time" id="selectedTimeDisplay">
                        <!-- Выбранное время будет отображаться здесь -->
                    </div>

                    <div class="time-actions">
                        <button class="time-btn reset" type="button" onclick="resetTime()">Сбросить</button>
                        <button class="time-btn confirm" type="button" onclick="confirmTime()">Готово</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Уведомления -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- Скрипты -->
    <script src="script.js"></script>
    <script src="cart.js"></script>
    <script src="datepicker.js"></script>
</body>
</html>

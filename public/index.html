<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ButterBakeryCafe</title>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Общие стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <button class="back-btn" onclick="history.back()">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="header-title">ButterBakeryCafe</div>
                </div>
                <div class="header-right">
                    <a href="/admin" id="adminLink" style="display: none;">
                        <i class="fas fa-crown header-icon"></i>
                    </a>
                    <i class="fas fa-search header-icon"></i>
                    <i class="fas fa-heart header-icon"></i>
                </div>
            </div>
        </header>

        <!-- Категории товаров -->
        <div class="categories" id="categoriesContainer">
            <button class="category active" data-category="all">Всё</button>
            <!-- Категории будут загружаться через JavaScript -->
        </div>

        <!-- Сетка товаров - 2 карточки в ряд -->
        <div class="cakes-grid" id="cakesGrid">
            <div class="loading">Загрузка товаров...</div>
        </div>

        <!-- Плавающая кнопка корзины -->
        <button class="cart-icon" id="cartIcon">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </button>

        <!-- Панель корзины -->
        <div class="cart-panel" id="cartPanel">
            <div class="cart-header">
                <h2>Корзина</h2>
                <button class="close-cart" id="closeCart">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="cart-items" id="cartItems">
                <!-- Товары в корзине будут добавляться через JavaScript -->
                <div class="empty-state">
                    <i class="fas fa-shopping-cart"></i>
                    <p>Корзина пуста</p>
                    <span>Добавьте товары из каталога</span>
                </div>
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Итого:</span>
                    <span id="cartTotalPrice">0 ₽</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>
            </div>
        </div>

        <!-- Модальное окно оформления заказа -->
        <div class="modal" id="checkoutModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Оформление заказа</h2>
                    <button class="close-modal" id="closeModal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="orderForm" class="order-form">
                    <div class="form-group">
                        <label for="name">Ваше имя *</label>
                        <input type="text" id="name" required minlength="2" placeholder="Иван Иванов">
                    </div>

                    <div class="form-group">
                        <label for="phone">Телефон *</label>
                        <input type="tel" id="phone" required placeholder="+7 (999) 999-99-99">
                    </div>

                    <div class="form-group">
                        <label for="address">Адрес доставки *</label>
                        <input type="text" id="address" required placeholder="ул. Ленина, д. 1, кв. 1">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="deliveryDate">Дата доставки *</label>
                            <input type="text" id="deliveryDate" required placeholder="Завтра">
                        </div>
                        <div class="form-group">
                            <label for="deliveryTime">Время *</label>
                            <input type="text" id="deliveryTime" required placeholder="12:00-14:00">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="wish">Пожелания к заказу</label>
                        <textarea id="wish" rows="2" placeholder="Комментарий для курьера..."></textarea>
                    </div>

                    <div class="order-summary" id="orderSummary">
                        <!-- Краткое содержание заказа -->
                    </div>

                    <button type="submit" class="submit-order">Подтвердить заказ</button>
                </form>
            </div>
        </div>

        <!-- Уведомления -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- Скрипты -->
    <script src="script.js"></script>
    <script src="cart.js"></script>
</body>
</html>
